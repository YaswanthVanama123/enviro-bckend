name: Deploy to DigitalOcean Droplet

on:
  push:
    branches:
      - V1.0
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to droplet over SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT || 22 }}
          script: |
            set -e

            cd /var/www/enviro-backend

            echo "Fetching latest code from GitHub..."
            git fetch origin

            echo "Resetting server code to origin/V1.0..."
            git reset --hard origin/V1.0

            echo "Installing dependencies..."
            npm ci

            echo "Restarting PM2 app..."
            pm2 restart enviro-backend || pm2 start npm --name enviro-backend -- start

            echo "Saving PM2 process list..."
            pm2 save

            echo "Deployment finished. PM2 status:"
            pm2 status

      - name: Health check
        run: |
          echo "Waiting for backend to stabilize..."
          sleep 15
          curl -f https://backend.clicksolver.com/health || exit 1